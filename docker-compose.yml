services:
  postgres-db:
    image: postgres:16-alpine
    container_name: loadtester-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: loadtesterdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: